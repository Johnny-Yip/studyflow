spring.application.name=StudyFlow

spring.datasource.url=jdbc:h2:mem:studyflow
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=never
server.error.include-binding-errors=never

# Optional: set STUDYFLOW_JWT_SECRET to a Base64-encoded HS256 key for stable JWTs across restarts.
# If omitted, StudyFlow generates an in-memory development key at startup.
studyflow.jwt.secret=${STUDYFLOW_JWT_SECRET:}
studyflow.jwt.expiration-ms=86400000

# Optional: override the local Canvas SQLite database path.
# Default is jdbc:sqlite:data/canvas-sync.db
# studyflow.canvas.database-url=jdbc:sqlite:/absolute/path/to/canvas-sync.db
