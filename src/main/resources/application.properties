spring.application.name=StudyFlow

spring.datasource.url=jdbc:h2:mem:studyflow
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=never
server.error.include-binding-errors=never

studyflow.jwt.secret=U3R1ZHlGbG93SldUU2VjcmV0S2V5Rm9yUG9ydGZvbGlvUHJvamVjdDIwMjYhU3ByaW5nQm9vdA==
studyflow.jwt.expiration-ms=86400000

